<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentalista 🔮 O Jogo da Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="jogo-container">
        <h1>🔮 O Mentalista</h1>
        <p class="instrucoes">Eu pensei em um número entre <b>1 e 100</b>. Você consegue adivinhar qual é?</p>
        
        <div class="input-grupo">
            <input type="number" id="chute-usuario" min="1" max="100" placeholder="00">
            <button id="btn-chutar">Chutar</button>
        </div>

        <p id="mensagem-dica">Boa sorte! Digite um número acima.</p>
        <p id="tentativas-restantes">Tentativas restantes: <b>7</b></p>
        
        <button id="btn-reiniciar" class="escondido">Jogar Novamente 🔄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
